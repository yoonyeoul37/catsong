name: mp3_player
description: Local MP3 Player App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  just_audio: ^0.9.46
  audio_service: ^0.18.15
  permission_handler: ^11.3.0
  provider: ^6.1.2
  marquee: ^2.2.3
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  http: ^1.2.2
  torch_light: ^1.0.0
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  chewie: ^1.8.5
  share_plus: ^10.0.0
  flutter_colorpicker: ^1.1.0
  google_fonts: ^8.1.0
  media_kit: ^1.1.11
  media_kit_libs_android_video: ^1.0.5
  wakelock_plus: ^1.2.8
  connectivity_plus: ^6.0.0
  audio_session: ^0.1.21
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/play_song.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icon_no_bg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: SpoqaHanSansNeo
      fonts:
        - asset: assets/fonts/SpoqaHanSansNeo-Light.ttf
          weight: 300
        - asset: assets/fonts/SpoqaHanSansNeo-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpoqaHanSansNeo-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpoqaHanSansNeo-Bold.ttf
          weight: 700

  assets:
    - assets/play_song.png
    - assets/icon_no_bg.png
    - assets/cat.png
    - assets/no_album.png
    - assets/cat_icon.png
    - assets/no_album.svg

flutter_native_splash:
  color: "#1E88E5"
  color_dark: "#1565C0"
  android_12:
    color: "#1E88E5"
    color_dark: "#1565C0"